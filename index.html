<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <time datetime="LOGIN PAGE"></time>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 style="color: olivedrab;">STUDENT REGISTRATION FORM</h1>
    <form>
    <!--NAME-->
    <label for="">Name :</label> <br> 
    <input type="name" placeholder="Name" required>
    <br>
    <br>
    <!--EMAIL-->
    <label for="">Email :</label> <br>
    <input type="email" placeholder="Email" required>
    <br>
    <br>
    <!--PASSWORD-->
    <label for="">Password :</label> <br>
    <input type="password" placeholder="Password" required>
    <!--GENDER-->
    <p>Gender :</p>
    <label for="male"><input type="radio" name="Gender" id="male" required>Male</label>
    <label for="female"><input type="radio" name="Gender" id="female" required>Female</label>
    <br>
    <br>
    <!--SKILLS-->
    <label for="">Skills :</label>
    <br>
    <br>
    <label for="html"><input type="checkbox" name="Skills" id="html">HTML</label>
    <label for="css"><input type="checkbox" name="Skills"  id="css">CSS</label>
    <label for="javascript"><input type="checkbox" name="Skills" id="javascript">JAVASCRIPT</label>
    <br>
    <br>
    <!--DATE OF BIRTH-->
    <label for="">Date Of Birth :</label> <br>
    <input type="date" required> 
    <br>
    <br>
    <!--REGISTER BUTTON-->
    <button type="Register">Register</button>
    </form>
</body>
</html>
